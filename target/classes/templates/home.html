<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Fila Saúde</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
       <div th:replace="~{fragments/navbar :: navbar}"></div>
  <div class="container mt-2 text-center">
        <h2 class="display-6 mb-2 fw-bold">Sistema Clínica</h2>
	   <!-- <hr>-->
         <div class="alert alert-info py-2 mb-2"> Bem-vindo ao sistema. Escolha uma ação.</div>
         <h3 class="mb-3">Ações rápidas</h3>
	     <div class="row">
	          <div class="col-md-6">
	              <div class="card shadow-sm">
	                 <div class="card-body p-3">
		                 <i class="bi bi-person-plus fs-1 text-primary"></i>
		                 <h4> Cadastrar Paciente </h4>
		                 <p> Novo cadastro.</p>
		                 <a th:href="@{/pacientes/novo}" class="btn btn-primary">Cadastrar</a>
	                </div>
	              </div>
	          </div>
	          <div class="col-md-6">
	              <div class="card shadow-sm mt-2">
	                 <div class="card-body p-3">
	                     <i class="bi bi-card-list fs-1 text-success"></i>
	                     <h4> Listar Pacientes</h4>
						 <p>Consultar pacientes.</p>
	                     <a th:href="@{/pacientes/listar}" class="btn btn-success">Listar</a>
	                </div>
	            </div>
	         </div>
	    </div>

		<div class="card mt-2">
		    <div class="card-body justify-content-center d-flex align-items-center gap-3">
				<h4 class="mb-0">Hospital</h4>
		        <i class="bi bi-hospital display-4 text-success"></i>
	            <h4 class="mb-0" th:text="${totalPacientes}">1</h4>
		    </div>
		</div>
  </div>
     <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
