<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
	<title>Cadastro Paciente</title>
	<meta name="viewport" content="width=device-width, initial-scale=1">
	
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"	rel="stylesheet">
</head>

<body>
	<div th:replace="~{fragments/navbar :: navbar}"></div>
	<div class="container mt-2">
  
     <h2 class="mb-3 mt-3 text-center fw-bold">Cadastro de Paciente</h2>
	 
	    <form th:action="@{/pacientes/salvar}" th:object="${paciente}" method="post">
	                     <input type="hidden" th:field="*{id}">
			   
			   <div class="mb-3">
			      <label class="form-label">Nome</label>
			      <input type="text" class="form-control" th:field="*{nome}" required>
			   </div>
			
			    <div class="mb-3">
					<label class="form-label">CPF</label>
					<input type="text" class="form-control" th:field="*{cpf}" required>
			    </div>
			
			<div class="mb-3">
			  <label class="form-label">Idade</label>
			  <input type="number" class="form-control" th:field="*{idade}">
			</div>
			
			<div class="mb-3">
			    <label class="form-label">Sexo</label>
			    <br>

			    <div class="form-check form-check-inline me-4">
			        <input class="form-check-input" type="radio" th:field="*{sexo}" value="Masculino">
			        <label class="form-check-label ms-0">Masculino</label>
			    </div>

			    <div class="form-check form-check-inline me-4">
			        <input class="form-check-input" type="radio" th:field="*{sexo}" value="Feminino">
			        <label class="form-check-label ms-0">Feminino</label>
			    </div>
			</div>
			
			<div class="mb-3">
			    <label class="form-label d-block">  Condições </label>
			    <div class="form-check form-check-inline">
			        <input class="form-check-input" type="checkbox"  th:field="*{habilidades}" value="Diabetes">
			        <label class="form-check-label"> Diabetes</label>
			    </div>
			
			    <div class="form-check form-check-inline">
			        <input class="form-check-input" type="checkbox" th:field="*{habilidades}" value="Hipertensao">
			        <label class="form-check-label">  Hipertensão  </label>
			    </div>
			
			    <div class="form-check form-check-inline">
			        <input class="form-check-input"  type="checkbox"  th:field="*{habilidades}"  value="Cardiaco">
			        <label class="form-check-label"> Cardíaco</label>
			    </div>
			</div>
			
			<div class="mb-4">
			    <input type="checkbox" th:field="*{ativo}">
			      Paciente Ativo
			</div>
			<button type="submit" class="btn btn-primary">Salvar</button>
	</form>
		 <div class="alert alert-success" th:if="${mensagem}" th:text="${mensagem}"></div>
</div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
