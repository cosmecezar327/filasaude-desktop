<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-BR">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title> Pacientes</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
	<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body>
     <div th:replace="~{fragments/navbar :: navbar}"> </div>
 
 <div class="container mt-2">
    <h2 class="mb-2 text-center fw-bold">Pacientes Cadastrados</h2>
    <a th:href="@{/pacientes/novo}" class="btn btn-success mb-4">
	   <i class="bi bi-person-plus"></i>
          Novo Paciente
    </a>
   

	 <div class="table-responsive">
		<table class="table table-hover table-sm align-middle">
			<thead>
				<tr>
					<th>ID</th>
					<th>Nome</th>
					<th class="d-none d-md-table-cell">CPF</th>
					<th class="text-center">Idade</th>
					<th class="d-none d-md-table-cell">Sexo</th>
					<th>Ativo</th>
					<th>Ações</th>
				</tr>
			</thead>
			
			<tbody>
			    <tr th:each="paciente : ${lista}">
					<td th:text="${paciente.id}"></td>
					<td th:text="${paciente.nome}"></td>
					<td class="d-none d-md-table-cell" th:text="${paciente.cpf}"></td>
					<td class= "text-center" th:text="${paciente.idade}"></td>
					<td class="d-none d-md-table-cell" th:text="${paciente.sexo}"></td>
					<td>
						<span class="badge bg-success" th:if="${paciente.ativo}">Sim</span>
					    <span class="badge bg-secondary" th:unless="${paciente.ativo}">Não</span>
					</td>
					<td>
						<div class="d-flex gap-2">
							<a th:href="@{/pacientes/editar/{id}(id=${paciente.id})}" class="btn btn-warning ">
					           <i class="bi bi-pencil"></i>
					        </a>
					        <a th:href="@{/pacientes/excluir/{id}(id=${paciente.id})}" class="btn btn-danger "
					                                                   onclick="return confirm('Excluir paciente?')">
					           <i class="bi bi-trash"></i>
					        </a>
					  </div>
					</td>
			    </tr>
			</tbody>
		</table>
	</div>
 </div>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
